# .pgloop.yaml — place in the project root or at ~/.config/pgloop/.pgloop.yaml
# CLI flags always take precedence over this file.

lint:
  pg_version: 14        # target PostgreSQL major version (affects P1 diagnosis)
  fail_on: CRITICAL     # CRITICAL or WARN
  suggestions: true     # show safe rewrite recipes in terminal output
  ignore: []            # e.g. [P9] for projects that already control timeouts via deploy tooling
