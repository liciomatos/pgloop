name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.1)'
        required: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y gcc

      - name: Build
        run: go build -o pgloop .

      - name: Test
        run: go test ./... -v -count=1

      - name: Benchmark (smoke)
        run: go test ./internal/lockmapper -bench=. -benchtime=1s

  build-linux:
    name: Build Linux binaries
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compilation tools
        run: sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        env:
          VERSION: ${{ steps.tag.outputs.value }}
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 \
            go build -ldflags "-X main.version=${VERSION}" -o dist/pgloop_linux_amd64 .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc \
            go build -ldflags "-X main.version=${VERSION}" -o dist/pgloop_linux_arm64 .
          cd dist
          tar czf pgloop_${VERSION}_linux_amd64.tar.gz pgloop_linux_amd64
          tar czf pgloop_${VERSION}_linux_arm64.tar.gz pgloop_linux_arm64

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/*.tar.gz

  build-macos:
    name: Build macOS binaries
    needs: test
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        env:
          VERSION: ${{ steps.tag.outputs.value }}
        run: |
          mkdir -p dist
          # arm64: native on Apple Silicon runner
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 \
            go build -ldflags "-X main.version=${VERSION}" -o dist/pgloop_darwin_arm64 .
          # amd64: Apple clang supports -arch x86_64 cross-compilation
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 CC="cc -arch x86_64" \
            go build -ldflags "-X main.version=${VERSION}" -o dist/pgloop_darwin_amd64 .
          cd dist
          tar czf pgloop_${VERSION}_darwin_arm64.tar.gz pgloop_darwin_arm64
          tar czf pgloop_${VERSION}_darwin_amd64.tar.gz pgloop_darwin_amd64

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/*.tar.gz

  release:
    name: Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.tag.outputs.value }} \
            --title "pgloop ${{ steps.tag.outputs.value }}" \
            --generate-notes \
            dist/*.tar.gz dist/checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
