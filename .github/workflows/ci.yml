name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y gcc

      - name: Build
        run: go build -o pgloop .

      - name: Test
        run: go test ./... -v -count=1

      - name: Benchmark (smoke)
        run: go test ./internal/lockmapper -bench=. -benchtime=1s

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc and cross-compilation tools
        run: sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
